<!DOCTYPE html>
<html lang="zh-Hant-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issac & Cenz | Wedding</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --font-sans-en: 'Montserrat', sans-serif;
            --font-serif-en: 'Playfair Display', serif;
            --font-sans-tc: 'Noto Sans TC', sans-serif;
            --font-serif-tc: 'Noto Serif TC', serif;
            --font-condensed: 'Inter', sans-serif;
        }

        body {
            background-color: #0a0a0a;
            color: #f5f5f5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .tier-1 {
            font-family: var(--font-sans-en);
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }

        .tier-2 {
            font-family: var(--font-serif-en);
        }

        .tier-3 {
            font-family: var(--font-condensed);
            letter-spacing: 0.05em;
        }

        .tc-sans {
            font-family: var(--font-sans-tc);
        }

        .tc-serif {
            font-family: var(--font-serif-tc);
        }

        .monochrome-img {
            filter: grayscale(100%) contrast(1.1);
        }

        .accent-color {
            color: #d6d0c4; /* Desaturated stone / beige */
        }
    </style>
</head>
<body class="min-h-screen flex flex-col md:flex-row">

    <!-- Image Pane -->
    <div class="w-full md:w-1/2 h-[50vh] md:h-screen relative overflow-hidden border-b md:border-b-0 md:border-r border-stone-900">
        <img src="media/Issac_Cenz-401-evo-ps.jpg" alt="Issac & Cenz" class="absolute inset-0 w-full h-full object-cover monochrome-img opacity-70">
        <div class="absolute inset-0 bg-gradient-to-t from-black/50 to-transparent"></div>
    </div>

    <!-- Content Pane -->
    <div class="w-full md:w-1/2 min-h-[50vh] md:h-screen flex flex-col justify-between p-8 md:p-16 lg:p-24 bg-[#0a0a0a]">

        <div class="space-y-16">
            <!-- Header Block -->
            <div class="space-y-6">
                <h1 class="tc-serif text-3xl md:text-4xl font-normal tracking-wider text-white">我們結婚了！</h1>
                <h2 class="tier-1 text-4xl md:text-5xl font-bold text-white tracking-[0.2em] leading-tight">ISSAC <span class="text-stone-600">&</span> CENZ</h2>
                <p class="tier-2 italic text-lg md:text-xl accent-color">Are Getting Married</p>
            </div>

            <!-- Date & Location Block -->
            <div class="space-y-3 border-l border-stone-800 pl-6">
                <p class="tc-sans text-sm tracking-[0.15em] text-stone-300">2026年6月29日(星期一)</p>
                <p class="tier-3 text-xs tracking-widest text-stone-500 uppercase">2026.06.29 | War Memorial Building, Harrow School</p>
            </div>

            <!-- Navigation Links -->
            <nav>
                <ul class="flex flex-col space-y-0">
                    <li>
                        <a href="https://cenzwong.github.io/w3dding-rsvp" target="_blank" rel="noopener noreferrer" class="group block py-6 border-b border-stone-800 hover:border-stone-500 transition-colors duration-500">
                            <div class="flex justify-between items-center">
                                <div class="space-y-2">
                                    <h3 class="tc-sans text-lg tracking-[0.1em] text-stone-300 group-hover:text-white transition-colors duration-500">線上登記出席</h3>
                                    <p class="tier-3 text-xs text-stone-500 uppercase group-hover:text-stone-400 transition-colors duration-500">Online RSVP</p>
                                </div>
                                <span class="tier-1 text-stone-700 group-hover:text-white transform group-hover:translate-x-2 transition-all duration-500">→</span>
                            </div>
                        </a>
                    </li>
                    <li>
                        <a href="https://cenzwong.github.io/w3dding-rsvp/invitation.pdf" target="_blank" rel="noopener noreferrer" class="group block py-6 border-b border-stone-800 hover:border-stone-500 transition-colors duration-500">
                            <div class="flex justify-between items-center">
                                <div class="space-y-2">
                                    <h3 class="tc-sans text-lg tracking-[0.1em] text-stone-300 group-hover:text-white transition-colors duration-500">下載婚禮邀請函</h3>
                                    <p class="tier-3 text-xs text-stone-500 uppercase group-hover:text-stone-400 transition-colors duration-500">Download Invitation PDF</p>
                                </div>
                                <span class="tier-1 text-stone-700 group-hover:text-white transform group-hover:translate-x-2 transition-all duration-500">→</span>
                            </div>
                        </a>
                    </li>
                    <li>
                        <a href="https://cenzwong.github.io/w3dding-gallery/" target="_blank" rel="noopener noreferrer" class="group block py-6 border-b border-stone-800 hover:border-stone-500 transition-colors duration-500">
                            <div class="flex justify-between items-center">
                                <div class="space-y-2">
                                    <h3 class="tc-sans text-lg tracking-[0.1em] text-stone-300 group-hover:text-white transition-colors duration-500">瀏覽婚紗相集</h3>
                                    <p class="tier-3 text-xs text-stone-500 uppercase group-hover:text-stone-400 transition-colors duration-500">View Wedding Gallery</p>
                                </div>
                                <span class="tier-1 text-stone-700 group-hover:text-white transform group-hover:translate-x-2 transition-all duration-500">→</span>
                            </div>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>

        <!-- Footer -->
        <div class="mt-16 md:mt-0 pt-8 flex items-center justify-between border-t border-stone-900">
            <p class="tier-3 text-[10px] tracking-[0.25em] text-stone-600 uppercase">
                Issac & Cenz
            </p>
            <p class="tier-3 text-[10px] tracking-[0.25em] text-stone-600 uppercase">
                2026.06.29
            </p>
        </div>

    </div>

</body>
</html>
