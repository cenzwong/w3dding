<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Wedding | Issac & Cenz</title>
    <!-- Google Fonts for the elegant script and clean sans-serif -->
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-color: #ffffff; /* White text for better contrast against the London background */
            --overlay: rgba(0, 0, 0, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: #f8f8f8;
            overflow: hidden;
        }

        /* Main Container */
        .hero {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* Placeholder representing a London architectural wedding aesthetic */
            background: linear-gradient(var(--overlay), var(--overlay)), 
                        url('https://github.com/cenzwong/w3dding/blob/main/media/big_ben_draft.jpg?raw=true');
            background-size: cover;
            background-position: center;
            color: var(--accent-color);
            text-align: center;
        }

        /* Central Typography */
        .title-group {
            z-index: 10;
            user-select: none;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .main-title {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(5rem, 18vw, 10rem);
            line-height: 0.9;
            margin: 0;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            font-weight: 400;
        }

        /* Footer Information Bar */
        .info-bar {
            position: absolute;
            bottom: 50px;
            width: 100%;
            max-width: 1000px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 50px;
            font-size: clamp(0.9rem, 2vw, 1.3rem);
            letter-spacing: 0.25em;
            text-transform: uppercase;
            font-weight: 400;
            z-index: 10;
            opacity: 0.9;
        }

        /* Decorative Elements */
        .decoration {
            position: absolute;
            bottom: 100px;
            width: 60px;
            height: 1px;
            background: var(--accent-color);
            opacity: 0.5;
        }

        /* Responsive Adjustments */
        @media (max-width: 768px) {
            .info-bar {
                flex-direction: column;
                gap: 12px;
                bottom: 30px;
                padding: 0;
                letter-spacing: 0.15em;
            }

            .main-title {
                font-size: clamp(3.5rem, 20vw, 7rem);
            }
        }

        /* Animations */
        .fade-in {
            animation: revealEffect 2.5s ease forwards;
        }

        @keyframes revealEffect {
            0% {
                opacity: 0;
                letter-spacing: -0.5em;
                filter: blur(12px);
                transform: translateY(30px);
            }
            100% {
                opacity: 1;
                letter-spacing: normal;
                filter: blur(0);
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <main class="hero">
        <div class="title-group fade-in">
            <h1 class="main-title">The<br>Wedding</h1>
        </div>

        <div class="info-bar fade-in" style="animation-delay: 0.6s;">
            <div class="name">Issac</div>
            <div class="date">29.06.2026</div>
            <div class="name">Cenz</div>
        </div>
    </main>

    <script>
        // Subtle tilt effect to give the card a premium feel
        const hero = document.querySelector('.hero');
        const title = document.querySelector('.title-group');

        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 40;
            const y = (window.innerHeight / 2 - e.pageY) / 40;
            
            if(title) {
                title.style.transform = `rotateY(${x}px) rotateX(${y}px) translateZ(20px)`;
            }
        });
    </script>
</body>
</html>
